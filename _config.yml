# Site settings
title: Agenticly
tagline: Notes on agentic software
description: >-
  The Agenticly blog — writing about agents, automation, and building
  software with AI.
author: Star Computer

# URL settings
#
# The blog is served publicly at https://agenticly.app/blog via a Cloudflare
# Worker that proxies to GitHub Pages. Because the public path prefix is
# "/blog", we set baseurl to "/blog" so every generated link and asset URL
# already resolves correctly behind the proxy. The Worker maps the "/blog"
# prefix to the GitHub Pages project path "/agenticly-blog" at the origin.
url: "https://agenticly.app"
baseurl: "/blog"

# No theme gem — the site ships its own layouts (_layouts/) and CSS
# (assets/css/style.css) for the custom Swiss-editorial design.

# Plugins (all on the GitHub Pages allowlist)
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Date format read by the custom layouts (kept under `minima` so existing
# `site.minima.date_format` references resolve).
minima:
  date_format: "%b %-d, %Y"

# Build settings
markdown: kramdown
permalink: /:year/:month/:day/:title/

# Pagination / feed
show_excerpts: true

# Defaults — force `layout: post` on everything in _posts/ so articles render
# with the blog theme even if the publishing tool omits layout from front
# matter. (The date-prefixed filename, YYYY-MM-DD-title.md, is still required
# for Jekyll to recognize a file as a post.)
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

exclude:
  - worker/
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .github/
